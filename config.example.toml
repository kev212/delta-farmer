# Use config calculator to estimate volume: https://deluxe-bienenstitch-a67274.netlify.app/
leverage = 10             # Use the lowest max across symbols (e.g. BTC=50x, ETH=25x → ≤25)
symbols = ["BTC", "ETH"]  # Available symbols: check on the exchange
# symbols_per_trade = 2   # Trade multiple symbols in parallel (see README)

use_limit = true
first_as_prime = true  # true = first account is always prime; false = random each cycle

# trade_size_pct = 0.5                          # Size as fraction of balance
trade_size_usd = { min = 140, max = 160 }       # Total size in USD at the leverage above (split 50% prime / 50% hedge)
trade_duration  = { min = "15m", max = "20m" }  # How long to hold positions
trade_cooldown  = { min = "3m",  max = "6m"  }  # Pause between trades

[[accounts]]
name = "acc1"
privkey = "your-private-key-here"  # Run `config encrypt` after filling in keys!
# proxy = "http://user:pass@host:port"

[[accounts]]
name = "acc2"
privkey = "your-private-key-here"
# enabled = false  # Exclude from trading but keep in stats

# ============================================================
# Slippage Tolerance
# ============================================================
# Maximum allowed slippage when submitting market orders.
# Lower = less spread cost but higher rejection risk in volatile market.
market_slippage_open = 0.005      # 0.5% — used when opening positions
market_slippage_close = 0.001     # 0.1% — used when closing positions

# ============================================================
# Spread Guardrail (0 = disabled, in basis points)
# ============================================================
# Skip the cycle if BBO spread exceeds threshold.
# 1 bps = 0.01%. Run: uv run tools/spread_sampler.py to observe.
# Realistic baselines: Nado BTC 5-15bps, Omni BTC 10-30bps.
max_spread_open_bps = 15          # skip cycle if any leg spread > 15bps at open
max_spread_close_bps = 30         # wait for spread < 30bps before close

# ============================================================
# Delta-PnL Gate (close-time safety)
# ============================================================
# Before closing, check that total combined PnL is balanced.
# 0 = disabled. 0.005 = 0.5% of total notional.
max_delta_pnl_pct = 0.005

# Max wait before force-closing when gate is held.
close_safety_wait_sec = 300       # 5 minutes
close_safety_poll_sec = 15        # poll every 15 seconds

