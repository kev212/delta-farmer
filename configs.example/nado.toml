# Trading parameters
symbols = ["BTC", "ETH", "SOL"]  # Perpetual contracts to trade (BTC-PERP, ETH-PERP, SOL-PERP on Nado)
leverage = 10  # Leverage multiplier (used for balance checks; Nado computes max order size)

trade_size_usd = { min = 140, max = 160 }  # Total size in USD (split 50/50 between LONG and SHORT)
trade_duration = { min = "15m", max = "20m" }  # How long to hold positions
trade_cooldown = { min = "3m", max = "6m" }  # Wait time between trades
trade_heartbeat = "15s"  # Position monitoring interval

first_as_main = true  # Always use first account as main (false = random selection)

use_limit = false  # Nado supports limit orders; set true to use for main account
limit_wait = "90s"  # Timeout before market fallback when use_limit = true


# Accounts (recommended: $100+ balance per account)
# Each account can optionally specify a subaccount name (default: "default")

[[accounts]]
name = "Account 1"
privkey = "your-ethereum-private-key-here"  # EVM private key (0x...) - run `config encrypt` after setup!
# proxy = "http://user:pass@proxy:port"  # Optional proxy
# enabled = true  # Optional: enable/disable account (default: true)

[[accounts]]
name = "Account 2"
privkey = "your-ethereum-private-key-here"

